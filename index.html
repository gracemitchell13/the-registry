<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Registry</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;font-size:17px;background:#F2F0EB;color:#1a1a18;padding:2rem 1.5rem;max-width:960px;margin:0 auto}
.tbtn{background:transparent;border:none;padding:6px 14px;cursor:pointer;font-size:14px;border-radius:20px;font-family:inherit;color:#555}
.tbtn.on{font-weight:500;color:#fff}
.cat-tile{border-radius:12px;padding:.9rem 1rem;cursor:pointer;border:2px solid transparent}
.cat-tile:hover{opacity:.85}
.cat-tile.sel{border-color:rgba(0,0,0,.25)}
.sc{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;overflow:hidden}
.pill{display:inline-block;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;white-space:nowrap;line-height:1.5}
.acrd{background:#fff;border:0.5px solid rgba(0,0,0,.1);border-radius:12px;padding:1rem 1.25rem}
.mwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center;padding:1rem}
.mbox{background:#fff;border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.mbox-header{padding:1.25rem 1.5rem 1rem;display:flex;align-items:flex-start;gap:1rem}
.mbox-cover{width:80px;height:80px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:36px;overflow:hidden;transition:background .3s}
.mbox-cover img{width:100%;height:100%;object-fit:cover;border-radius:10px}
.mbox-header-text{flex:1}
.mbox-title-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.7;margin-bottom:4px}
.mbox-title-display{font-size:18px;font-weight:700;line-height:1.2;min-height:24px}
.mbox-creator-display{font-size:13px;opacity:.75;margin-top:3px;min-height:18px}
.mbox-body{padding:.75rem 1.5rem 1.5rem;display:flex;flex-direction:column;gap:10px}
.mbox-label{font-size:12px;color:#666;margin-bottom:3px;display:block}
input,select,textarea{box-sizing:border-box;width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;margin:0}
button{padding:8px 16px;border:0.5px solid rgba(0,0,0,.2);border-radius:8px;font-size:14px;font-family:inherit;cursor:pointer;background:#fff}
.mbox-close{background:none;border:none;font-size:22px;cursor:pointer;line-height:1;padding:0;opacity:.5;flex-shrink:0}
.mbox-close:hover{opacity:1}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.btrack{flex:1;height:14px;border-radius:3px;background:rgba(0,0,0,.07);overflow:hidden;display:flex}
.icnbtn{border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:13px;padding:0;display:flex;align-items:center;justify-content:center;font-family:inherit;opacity:.85}
.icnbtn:hover{opacity:1}
.cthumb{width:100%;height:100%;object-fit:cover;display:block}
#status{font-size:12px;color:#C4477A;margin-top:.4rem;min-height:16px}
.hmenu-wrap{position:relative}
.hmenu-btn{background:none;border:0.5px solid #6A7898;color:#2C3A58;border-radius:6px;padding:5px 9px;cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;width:32px;height:32px}
.hmenu-btn:hover{background:rgba(255,255,255,.3)}
.hmenu-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#D8DCE8;border:0.5px solid rgba(0,0,0,.1);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.08);min-width:140px;z-index:50;overflow:hidden}
.hmenu-dropdown.open{display:block}
.hmenu-item{display:block;padding:10px 16px;font-size:13px;color:#2C3A58;text-decoration:none;font-family:inherit;white-space:nowrap}
.hmenu-item:hover{background:rgba(0,0,0,.06)}
.view-toggle{display:flex;gap:4px;background:#fff;border:0.5px solid rgba(0,0,0,.12);border-radius:8px;padding:3px}
.view-btn{background:none;border:none;cursor:pointer;padding:5px 8px;border-radius:6px;font-size:14px;line-height:1;color:#888}
.view-btn.on{background:#484560;color:#fff}
.list-view{display:flex;flex-direction:column;gap:2px}
.list-row{display:flex;align-items:center;gap:10px;background:#fff;border:0.5px solid rgba(0,0,0,.08);border-radius:10px;padding:10px 12px;min-height:52px;transition:background .1s}
.list-row:hover{background:#f8f7f5}
.list-thumb{width:34px;height:34px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.list-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.list-title{font-size:14px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.list-creator{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:140px;flex-shrink:0}
.list-rating{font-size:12px;color:#EF9F27;white-space:nowrap;flex-shrink:0;width:80px;letter-spacing:1px}
.list-status{flex-shrink:0;min-width:90px;text-align:center}
.list-actions{display:flex;gap:3px;flex-shrink:0;opacity:0}
.list-row:hover .list-actions{opacity:1}
@media(max-width:600px){.list-creator{display:none}.list-actions{opacity:1}}
@media(max-width:520px){
  body{padding:0 0 3rem}
  #hdr-stats span[style*="font-size:20px"]{font-size:16px!important}
  #hdr-stats span[style*="font-size:12px"]{font-size:11px!important}
  .cat-tile{padding:.6rem .5rem}
  .cat-tile div[style*="font-size:24px"]{font-size:18px!important}
  .cat-tile div[style*="font-size:11px"]{font-size:9px!important;line-height:1.3}
  .cat-tile div[style*="font-size:12px"]{font-size:10px!important}
  .consuming-items{flex-direction:column;gap:6px}
  .consuming-item{width:100%}
  .consuming-title{max-width:200px!important}
  #tiles{grid-template-columns:repeat(5,minmax(0,1fr))!important;gap:6px!important}
  .carousel-img{width:44px!important;height:44px!important}
  .mbox{max-width:100%!important;margin:0!important;border-radius:16px 16px 0 0!important}
  .mwrap{align-items:flex-end!important;padding:0!important}
}
.consuming-wrap{padding:1rem 1.5rem 0;display:none}
.consuming-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#3A4A68;margin-bottom:.6rem}
.consuming-items{display:flex;gap:10px;flex-wrap:wrap}
.consuming-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.5);border-radius:10px;padding:6px 10px 6px 6px;cursor:pointer;transition:background .15s}
.consuming-item:hover{background:rgba(255,255,255,.7)}
.consuming-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:18px}
.consuming-thumb img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.consuming-title{font-size:13px;font-weight:500;color:#1A2438;max-width:110px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.consuming-type{font-size:11px;color:#4A5A80;margin-top:1px}
.carousel-wrap{overflow:hidden;width:100%;margin-top:1rem;mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%);-webkit-mask-image:linear-gradient(to right,transparent 0%,black 8%,black 92%,transparent 100%)}
.notes-modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
.notes-modal-bg.open{display:flex}
.notes-modal{background:#fff;border-radius:16px;padding:1.5rem;width:340px;max-width:92vw;box-shadow:0 8px 32px rgba(0,0,0,.18);position:relative}
.notes-modal-cover{width:72px;height:72px;border-radius:10px;object-fit:cover;float:left;margin:0 1rem 1rem 0}
.notes-modal-cover-placeholder{width:72px;height:72px;border-radius:10px;float:left;margin:0 1rem 1rem 0;display:flex;align-items:center;justify-content:center;font-size:32px}
.notes-modal-title{font-size:16px;font-weight:600;color:#1a1a18;line-height:1.3;margin-bottom:2px}
.notes-modal-creator{font-size:13px;color:#666;margin-bottom:.5rem}
.notes-modal-rating{margin-bottom:.75rem}
.notes-modal-notes{font-size:14px;color:#444;line-height:1.6;clear:both}
.notes-modal-df{font-size:12px;color:#999;margin-top:.75rem}
.notes-modal-close{position:absolute;top:12px;right:14px;background:none;border:none;font-size:22px;cursor:pointer;color:#999;line-height:1;padding:0}
.notes-modal-close:hover{color:#1a1a18}
.notes-expand-hint{font-size:11px;color:#bbb;margin-top:4px;cursor:pointer}
.has-notes{cursor:pointer}
.has-notes:hover .notes-expand-hint{color:#888}
.carousel-track{display:flex;gap:8px;width:max-content;animation:scroll-left 40s linear infinite}
.carousel-track:hover{animation-play-state:paused}
@keyframes scroll-left{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.carousel-img{width:52px;height:52px;border-radius:6px;object-fit:cover;flex-shrink:0;opacity:.85;transition:opacity .2s}
.carousel-img:hover{opacity:1}

@media(max-width:600px){
  /* Body */
  body{padding:0 0 3rem}

  /* Header - compact, stats on one line */
  .site-header-inner{padding:1rem 1rem .6rem;position:relative}
  .site-header-inner > div:first-child > div:first-child{font-size:10px}
  .site-header-inner > div:first-child > div:nth-child(2){font-size:28px;margin-bottom:.5rem}
  #hdr-stats{gap:5px;flex-wrap:nowrap}
  #hdr-stats > div{display:flex;align-items:baseline;gap:3px}
  #hdr-stats > div > span:first-child{font-size:15px}
  #hdr-stats > div > span:last-child{font-size:11px}
  #hdr-stats > span{font-size:11px}
  /* + Add button: top right corner */
  .site-header-inner > div:last-child{position:absolute;top:1rem;right:1rem}
  .site-header-inner > div:last-child button{font-size:12px;padding:6px 12px}

  /* Category tiles - abbreviate Live Events */
  .cat-tile{padding:.55rem .4rem}
  .cat-tile > div:nth-child(1){font-size:18px;margin-bottom:2px}
  .cat-tile > div:nth-child(2){font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cat-tile > div:nth-child(3){font-size:18px}
  .cat-tile > div:last-child{font-size:9px}

  /* Charts - stack vertically */
  .charts-grid{grid-template-columns:1fr !important}

  /* Top picks - single column */
  #tops > div{flex-direction:column}
  #tops > div > div{width:100%}

  /* Filter tabs */
  #stabs{gap:3px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
  .tbtn{padding:5px 10px;font-size:12px;white-space:nowrap}

  /* Cards */
  #cards{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}

  /* Form modal - slides up from bottom */
  .mwrap{align-items:flex-end;padding:0}
  .mbox{border-radius:20px 20px 0 0;max-width:100%;max-height:92vh;overflow-y:auto}

  /* Consuming items */
  .consuming-items{gap:6px}
  .consuming-item{width:100%}

  /* By category label */
  .brow > div:first-child{width:72px;font-size:11px}
}
</style>
</head>
<body>

<div id="mwrap" class="mwrap">
  <div class="mbox">
    <div class="mbox-header" id="mbox-header">
      <div class="mbox-cover" id="mbox-cover">👗</div>
      <div class="mbox-header-text">
        <div class="mbox-title-label" id="mbox-type-label">Apparel</div>
        <div class="mbox-title-display" id="mbox-title-display">Item</div>
        <div class="mbox-creator-display" id="mbox-creator-display"></div>
      </div>
      <button class="mbox-close" onclick="closeM()">&times;</button>
    </div>
    <div class="mbox-body">
      <div>
        <label class="mbox-label">Category</label>
        <select id="ft" onchange="updLbl();updateFormTheme()">
          <option value="apparel">Apparel</option>
          <option value="home">Home</option>
          <option value="beauty">Beauty &amp; Body</option>
          <option value="kitchen">Kitchen</option>
          <option value="jewelry">Jewelry</option>
          <option value="paper">Books &amp; Paper</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="mbox-label">Item</label>
        <input id="ftitle" type="text" placeholder="What is it..." oninput="updateFormPreview()">
        <div id="terr" style="font-size:13px;color:#c00;margin-top:3px;display:none">Required.</div>
      </div>
      <div>
        <label class="mbox-label" id="clbl">Brand</label>
        <input id="fcreator" type="text" oninput="updateFormPreview()">
      </div>
      <div style="display:flex;gap:10px">
        <div style="flex:1">
          <label class="mbox-label">Price <span style="font-weight:400;opacity:.6">(USD)</span></label>
          <input id="fprice" type="number" step="0.01" min="0" placeholder="0">
        </div>
        <div style="flex:2">
          <label class="mbox-label">Link <span style="font-weight:400;opacity:.6">(optional)</span></label>
          <input id="furl" type="url" placeholder="https://...">
        </div>
      </div>
      <div>
        <label class="mbox-label">Status</label>
        <select id="fstatus" onchange="toggleDateFinished()">
          <option value="wanted">Wanted</option>
          <option value="purchased">Purchased</option>
          <option value="gifted">Gifted</option>
          <option value="archived">Archived</option>
        </select>
      </div>
      <div id="date-finished-field" style="display:none">
        <label class="mbox-label">Date acquired</label>
        <input id="fdatefinished" type="date">
      </div>
      <div>
        <label class="mbox-label">Want level</label>
        <div id="si" style="display:flex;gap:2px"></div>
      </div>
      <div>
        <label class="mbox-label">Notes <span style="font-weight:400;opacity:.6">(size, color, etc.)</span></label>
        <textarea id="fnotes" rows="2" style="resize:vertical"></textarea>
      </div>
      <div>
        <label class="mbox-label">Image URL <span style="font-weight:400;opacity:.6">(optional)</span></label>
        <input id="fimgurl" type="url" placeholder="https://...">
      </div>
      <div style="display:flex;gap:8px;margin-top:4px">
        <button onclick="saveE()" style="flex:1;font-weight:500" id="savebtn">Save</button>
        <button onclick="closeM()" style="flex:1">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div style="border-radius:0 0 0 0;overflow:hidden;margin-bottom:1.5rem;background:#D8DCE8">
  <div style="display:flex;height:6px">
    <div style="flex:1;background:#B8C4D8"></div>
    <div style="flex:1;background:#8A9AB8"></div>
    <div style="flex:1;background:#C4477A"></div>
    <div style="flex:1;background:#8A9AB8"></div>
    <div style="flex:1;background:#B8C4D8"></div>
  </div>
  <div style="padding:1.4rem 1.5rem .75rem;position:relative">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem">
      <div>
        <div style="font-size:12px;font-weight:500;letter-spacing:.12em;color:#1A2438;text-transform:uppercase;margin-bottom:.2rem">Things I want but am resisting</div>
        <div style="font-family:'Josefin Sans',sans-serif;font-size:38px;font-weight:600;color:#1A2438;line-height:1;margin-bottom:.8rem;letter-spacing:.05em;text-transform:uppercase">The Registry</div>
        <div id="hdr-stats" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center"></div>
        <div id="status">Connecting...</div>
      </div>
      <div style="display:flex;gap:8px;padding-top:4px">
        <button id="login-btn" onclick="signIn()" style="font-size:12px;background:none;border:0.5px solid #6A7898;color:#2C3A58;font-weight:500;border-radius:6px;padding:5px 12px;display:none">Sign in</button>
      <button id="logout-btn" onclick="signOut()" style="font-size:12px;background:none;border:0.5px solid #6A7898;color:#2C3A58;font-weight:500;border-radius:6px;padding:5px 12px;display:none">Sign out</button>
      <button id="add-btn" onclick="openM(null)" style="font-size:12px;background:#C4477A;border:none;color:#fff;font-weight:500;border-radius:6px;padding:5px 12px;display:none">+ Add</button>
        <div class="hmenu-wrap">
          <button class="hmenu-btn" onclick="toggleMenu()" title="Menu">&#9776;</button>
          <div class="hmenu-dropdown" id="hmenu">
            <a href="https://gracemitchell13.github.io/media-log/" class="hmenu-item">Media Log →</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="consuming-wrap" id="consuming-wrap">
    <div class="consuming-label">Currently Consuming</div>
    <div class="consuming-items" id="consuming-items"></div>
  </div>
  <div class="carousel-wrap" id="carousel-wrap" style="display:none;padding:0 1.5rem 1.2rem">
    <div class="carousel-track" id="carousel-track"></div>
  </div>
</div>

<div id="tiles" style="display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px;margin-bottom:1.5rem"></div>

<div class="charts-grid" style="display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:12px;margin-bottom:12px">
  <div class="acrd">
    <div style="font-family:'Josefin Sans',sans-serif;font-size:18px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#1A2438;margin-bottom:.85rem">By category</div>
    <div id="cchart"></div>
    <div style="display:flex;gap:12px;margin-top:.75rem;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#2C3A58;display:inline-block"></span>Wanted</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#3B6D11;display:inline-block"></span>Purchased</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#7F77DD;display:inline-block"></span>Gifted</span>
      <span style="display:flex;align-items:center;gap:4px;font-size:12px;color:#666"><span style="width:9px;height:9px;border-radius:2px;background:#888780;display:inline-block"></span>Archived</span>
    </div>
  </div>
  <div class="acrd">
    <div style="font-family:'Josefin Sans',sans-serif;font-size:18px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#1A2438;margin-bottom:.85rem">Ratings</div>
    <div id="rchart" style="display:flex;align-items:flex-end;gap:4px;height:100px"></div>
  </div>
</div>

<div class="acrd" style="margin-bottom:1.5rem">
  <div style="font-family:'Josefin Sans',sans-serif;font-size:18px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:#1A2438;margin-bottom:.75rem">Most Wanted</div>
  <div id="tops"></div>
</div>

<div style="margin-bottom:.75rem">
  <input id="search" type="text" placeholder="Search titles, authors, notes..." oninput="render()" style="width:100%;padding:8px 12px;border:0.5px solid rgba(0,0,0,.15);border-radius:8px;font-size:14px;font-family:inherit;background:#fff">
</div>
<div style="display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:.75rem">
  <span style="font-size:13px;color:#999;margin-right:2px">Filter:</span>
  <div id="stabs" style="display:flex;flex-wrap:wrap;gap:5px"></div>
</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <span id="cnt" style="font-size:14px;color:#666"></span>
  <div style="display:flex;gap:8px;align-items:center">
    <div class="view-toggle">
      <button class="view-btn on" id="vbtn-cards" onclick="setView('cards')" title="Card view">&#x229E;</button>
      <button class="view-btn" id="vbtn-list" onclick="setView('list')" title="List view">&#9776;</button>
    </div>
    <select id="fmonth" onchange="render()" style="font-size:13px;width:auto">
      <option value="all">All months</option>
      <option value="01">January</option>
      <option value="02">February</option>
      <option value="03">March</option>
      <option value="04">April</option>
      <option value="05">May</option>
      <option value="06">June</option>
      <option value="07">July</option>
      <option value="08">August</option>
      <option value="09">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>
    <select id="srt" onchange="render()" style="font-size:13px;width:auto">
      <option value="d-">Newest first</option>
      <option value="d+">Oldest first</option>
      <option value="r-">Top rated</option>
      <option value="az">A-Z</option>
      <option value="df-">Date finished (newest)</option>
      <option value="df+">Date finished (oldest)</option>
    </select>
  </div>
</div>
<div id="cards" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px"></div>
<div id="empty" style="display:none;text-align:center;padding:3rem;color:#999">Nothing here yet.</div>

<div class="notes-modal-bg" id="notes-modal-bg">
  <div class="notes-modal" id="notes-modal">
    <button class="notes-modal-close" onclick="closeNotes()">&times;</button>
    <div id="notes-modal-inner"></div>
  </div>
</div>

var data=[],selR=0,fType='all',fStatus='all',editId=null,imgCache={};

},function(err){setStatus('Connection error.');console.error(err);});

function loadImg(e,cb){
  if(imgCache[e.id]!==undefined){cb(imgCache[e.id]);return;}
  if(e.imgurl){imgCache[e.id]=e.imgurl;cb(e.imgurl);return;}
  imgCache[e.id]=null;cb(null);
}

function applyThumb(id,src){
  ['th-','tp-'].forEach(function(p){
    var el=document.getElementById(p+id);
    if(el&&src)el.innerHTML='<img class="cthumb" src="'+src+'" onerror="this.style.display=\'none\'">';
  });
}

function st(n,sz){
  sz=sz||14;var s='';
  for(var i=0;i<5;i++) s+='<span style="font-size:'+sz+'px;color:'+(i<n?'#EF9F27':'#ccc')+'">'+(i<n?'★':'☆')+'</span>';
  return s;
}

function updLbl(){document.getElementById('clbl').textContent=CATS[document.getElementById('ft').value].cl;}

function updateFormTheme(){
  var type=document.getElementById('ft').value;
  var c=CATS[type];
  var header=document.getElementById('mbox-header');
  var cover=document.getElementById('mbox-cover');
  var label=document.getElementById('mbox-type-label');
  header.style.background=c.bg;
  cover.style.background=c.bg;
  label.style.color=c.tx;
  document.getElementById('mbox-title-display').style.color=c.tx;
  document.getElementById('mbox-creator-display').style.color=c.tx;
  // Update save button color
  var saveBtn=document.getElementById('savebtn');
  saveBtn.style.background=c.hd;
  saveBtn.style.borderColor=c.hd;
  saveBtn.style.color='#fff';

  if(!document.getElementById('mbox-cover').querySelector('img')){
    cover.textContent=c.e;
  }

var formImgTimer=null;
function updateFormPreview(){
  var title=document.getElementById('ftitle').value.trim();
  var creator=document.getElementById('fcreator').value.trim();
  var type=document.getElementById('ft').value;
  var c=CATS[type];
  // Update text preview
  document.getElementById('mbox-title-display').textContent=title||'Title';
  document.getElementById('mbox-creator-display').textContent=creator||'';
  document.getElementById('mbox-type-label').textContent=c.sl;
  // Debounce image fetch
  if(formImgTimer) clearTimeout(formImgTimer);
  if(!title) return;
  formImgTimer=setTimeout(function(){
    var cover=document.getElementById('mbox-cover');
    var fakeEntry={id:'preview',type:type,title:title,creator:creator,imgurl:document.getElementById('fimgurl').value.trim()};
    delete imgCache['preview'];
    loadImg(fakeEntry,function(src){
      if(src){
        cover.innerHTML='<img src="'+src+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px">';
      } else {
        cover.innerHTML=c.e;
      }
    });
  },600);
}

function toggleDateFinished(){
  var status=document.getElementById('fstatus').value;
  var field=document.getElementById('date-finished-field');
  field.style.display=(status==='purchased'||status==='gifted')?'block':'none';
  if((status==='purchased'||status==='gifted')&&!document.getElementById('fdatefinished').value){
    document.getElementById('fdatefinished').value=new Date().toISOString().slice(0,10);
  }
}

function initStars(){
  var si=document.getElementById('si');
  si.innerHTML='';
  for(var i=0;i<5;i++){
    (function(idx){
      var btn=document.createElement('button');
      btn.type='button';
      btn.textContent='☆';
      btn.style.cssText='background:none;border:none;font-size:26px;cursor:pointer;color:#ccc;padding:2px;line-height:1';
      btn.addEventListener('click',function(){selR=idx+1;paintStars(selR);});
      btn.addEventListener('mouseover',function(){paintStars(idx+1);});
      btn.addEventListener('mouseout',function(){paintStars(selR);});
      si.appendChild(btn);
    })(i);
  }
}

function paintStars(active){
  var btns=document.getElementById('si').children;
  for(var i=0;i<btns.length;i++){
    btns[i].textContent=i<active?'★':'☆';
    btns[i].style.color=i<active?'#EF9F27':'#ccc';
  }
}

function drawStars(active){
  if(!document.getElementById('si').children.length) initStars();
  paintStars(active);
}

function openM(id){
  editId=id;
  var e=id?data.filter(function(x){return x.id===id;})[0]:null;
  document.getElementById('savebtn').textContent=e?'Update':'Save';
  document.getElementById('terr').style.display='none';
  if(e){
    document.getElementById('ftitle').value=e.title;
    document.getElementById('mbox-title-display').textContent=e.title;

    document.getElementById('mbox-creator-display').textContent=e.creator||'';

    document.getElementById('furl').value=e.url||'';

    document.getElementById('fimgurl').value=e.imgurl||'';
    var formCover=document.getElementById('mbox-cover');

    if(cachedSrc){
      formCover.innerHTML='<img src="'+cachedSrc+'" style="width:100%;height:100%;object-fit:cover;border-radius:10px">';

function closeM(){document.getElementById('mwrap').style.display='none';editId=null;}

function saveE(){
  if(!currentUser){setStatus('Please sign in to save entries.');return;}
  var title=document.getElementById('ftitle').value.trim();
  if(!title){document.getElementById('terr').style.display='block';return;}
  var savedRating=selR;
  var savedEditId=editId;
  var priceVal=document.getElementById('fprice').value;
  var entry={
    type:document.getElementById('ft').value,
    title:title,
    creator:document.getElementById('fcreator').value.trim(),
    price:priceVal===''?null:parseFloat(priceVal),
    url:document.getElementById('furl').value.trim(),
    status:document.getElementById('fstatus').value,
    rating:savedRating,
    notes:document.getElementById('fnotes').value.trim(),
    imgurl:document.getElementById('fimgurl').value.trim(),
    datefinished:document.getElementById('fdatefinished').value||'',
    date:new Date().toISOString().slice(0,10)
  };
  closeM();
  setStatus('Saving...');
  var p=savedEditId?col.doc(savedEditId).set(entry):col.add(entry);
  p.then(function(){
    setStatus('Saved.');
    setTimeout(function(){setStatus('');},2000);
  }).catch(function(err){setStatus('Error: '+err.message);console.error(err);});
}

function delE(id){
  if(!currentUser){setStatus('Please sign in to delete entries.');return;}
  if(!confirm('Remove this entry?'))return;
  col.doc(id).delete().catch(function(err){setStatus('Error: '+err.message);});
}

function render(){

  var ks=Object.keys(CATS);var tH='';
  ks.forEach(function(k){
    var c=CATS[k];var it=data.filter(function(e){return e.type===k;});
    var wt=it.filter(function(e){return e.status==='wanted';}).length;
    var pu=it.filter(function(e){return e.status==='purchased';}).length;

    var tot=it.length||1;var sel=fType===k;
    tH+='<div class="cat-tile'+(sel?' sel':'')+'" onclick="setTF(\''+(sel?'all':k)+'\')" style="background:'+c.bg+';border-color:'+(sel?c.dot:'transparent')+'">'
      +'<div style="font-size:20px;line-height:1;margin-bottom:4px">'+c.e+'</div>'
      +'<div style="font-size:12px;font-weight:500;color:'+c.tx+';margin-bottom:1px">'+c.l+'</div>'
      +'<div style="font-size:24px;font-weight:500;color:'+c.hd+'">'+it.length+'</div>'
      +'<div style="height:5px;border-radius:3px;overflow:hidden;background:rgba(0,0,0,.08);display:flex;margin-top:5px">'
        +'<div style="width:'+Math.round(wt/tot*100)+'%;height:100%;background:'+c.hd+'"></div>'
        +'<div style="width:'+Math.round(pu/tot*100)+'%;height:100%;background:'+c.dot+'"></div>'
        +'<div style="width:'+Math.round(gf/tot*100)+'%;height:100%;background:'+c.dot+';opacity:.5"></div>'
        +'<div style="width:'+Math.round(ar/tot*100)+'%;height:100%;background:#888780;opacity:.4"></div>'
      +'</div>'
      +'<div style="font-size:11px;color:'+c.tx+';opacity:.75;margin-top:4px">'+wt+' wanted · '+(pu+gf)+' got</div>'
    +'</div>';
  });
  document.getElementById('tiles').innerHTML=tH;

  var maxC=1;
  ks.forEach(function(k){var n=data.filter(function(e){return e.type===k;}).length;if(n>maxC)maxC=n;});
  var cH='';
  ks.forEach(function(k){
    var c=CATS[k];
    var wt=data.filter(function(e){return e.type===k&&e.status==='wanted';}).length;
    var pu=data.filter(function(e){return e.type===k&&e.status==='purchased';}).length;
    var gf=data.filter(function(e){return e.type===k&&e.status==='gifted';}).length;
    var ar=data.filter(function(e){return e.type===k&&e.status==='archived';}).length;
    var tot=wt+pu+gf+ar;
    cH+='<div class="brow"><div style="width:82px;font-size:13px;color:#666;text-align:right;flex-shrink:0">'+c.l+'</div>'
      +'<div class="btrack">'
        +'<div style="width:'+Math.round(wt/maxC*100)+'%;height:100%;background:#2C3A58"></div>'
        +'<div style="width:'+Math.round(pu/maxC*100)+'%;height:100%;background:#3B6D11"></div>'
        +'<div style="width:'+Math.round(gf/maxC*100)+'%;height:100%;background:#7F77DD"></div>'
        +'<div style="width:'+Math.round(ar/maxC*100)+'%;height:100%;background:#888780;opacity:.6"></div>'
      +'</div>'
      +'<div style="width:22px;font-size:13px;color:#666">'+tot+'</div></div>';
  });
  document.getElementById('cchart').innerHTML=cH;

  var ra=data.filter(function(e){return e.rating>0;});
  var rD=[0,0,0,0,0];
  ra.forEach(function(e){if(e.rating>=1&&e.rating<=5)rD[e.rating-1]++;});
  var maxR=Math.max.apply(null,rD)||1;
  var rColors=['#D0D4E0','#A8B4CC','#8098B8','#5A7AA0','#4A5A80'];

  var srt=document.getElementById('srt').value;

  else if(srt==='r-') f.sort(function(a,b){return b.rating-a.rating;});
  else if(srt==='df-') f.sort(function(a,b){return (b.datefinished||'').localeCompare(a.datefinished||'');});
  else if(srt==='df+') f.sort(function(a,b){return (a.datefinished||'').localeCompare(b.datefinished||'');});
  else f.sort(function(a,b){return a.title.localeCompare(b.title);});

  document.getElementById('cnt').textContent=f.length+' '+(f.length===1?'entry':'entries');

        +'<div class="list-title">'+titleHTML+'</div>'
        +'<div class="list-creator">'+(e.creator||'')+'</div>'
        +'<div class="list-rating">'+stars+'</div>'
        +'<div style="font-size:13px;color:#444;width:60px;text-align:right;flex-shrink:0">'+priceStr+'</div>'
        +'<span class="pill list-status" style="background:'+s.bg+';color:'+s.tx+'">'+s.l+'</span>'
        +'<div class="list-actions">'
          +(currentUser?'<button class="icnbtn" onclick="openM(\''+e.id+'\')" style="background:#f5f4f0" title="Edit">&#9998;</button><button class="icnbtn" onclick="delE(\''+e.id+'\')" style="background:#f5f4f0" title="Remove">&times;</button>':'')
        +'</div>'
      +'</div>';
    });
    lh+='</div>';
    document.getElementById('cards').innerHTML=lh;
    document.getElementById('cards').style.display='block';
    f.forEach(function(e){
      if(imgCache[e.id]===undefined){
        (function(en){loadImg(en,function(src){if(src){imgCache[en.id]=src;render();}});})(e);
      }
    });
    return;
  }
  document.getElementById('cards').style.display='grid';
  var ch='';
  f.forEach(function(e){
    var c=CATS[e.type],s=SM[e.status];
    var archivedS=e.status==='archived'?';opacity:.55':'';
    var cached=imgCache[e.id];var cachedSrc=cached&&(typeof cached==='object'?cached.src:cached);
    var ti=cachedSrc?'<img class="cthumb" src="'+cachedSrc+'" onerror="this.style.display=\'none\'">':'<span style="font-size:34px">'+c.e+'</span>';
    var priceStr=(typeof e.price==='number')?('$'+Math.round(e.price)):'';
    var titleHTML=e.url?('<a href="'+e.url+'" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="color:inherit;text-decoration:none">'+e.title+'</a>'):e.title;
    ch+='<div class="sc" style="'+(currentUser?'cursor:pointer':'')+archivedS+'"'+(currentUser?' onclick="openM(\''+e.id+'\')"':'')+'>'
      +'<div style="width:100%;padding-top:160%;position:relative;background:'+c.bg+'">'
        +'<div id="th-'+e.id+'" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden">'+ti+'</div>'
        +'<div style="position:absolute;top:6px;left:6px"><span class="pill" style="background:'+c.bg+';color:'+c.tx+'">'+c.sl+'</span></div>'
        +(priceStr?'<div style="position:absolute;bottom:6px;left:6px"><span class="pill" style="background:rgba(255,255,255,.92);color:#1a1a18;font-weight:500">'+priceStr+'</span></div>':'')
        +'<div style="position:absolute;top:5px;right:5px;display:flex;gap:3px">'
          +(currentUser?'<button class="icnbtn" onclick="event.stopPropagation();openM(\''+e.id+'\')" style="background:'+c.bg+';color:'+c.tx+'" title="Edit">✎</button><button class="icnbtn" onclick="event.stopPropagation();delE(\''+e.id+'\')" style="background:'+c.bg+';color:'+c.tx+'" title="Remove">×</button>':'')
        +'</div>'
      +'</div>'
      +'<div style="padding:.75rem">'
        +'<div style="font-size:15px;font-weight:500;color:#1a1a18;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3">'+titleHTML+'</div>'
        +(e.creator?'<div style="font-size:13px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px">'+e.creator+'</div>':'')
        +'<div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px;gap:3px">'
          +(e.rating?'<div>'+st(e.rating,12)+'</div>':'<div style="font-size:12px;color:#aaa">—</div>')
          +'<span class="pill" style="background:'+s.bg+';color:'+s.tx+'">'+s.l+'</span>'
        +'</div>'
        +(e.datefinished?'<div style="font-size:11px;color:#aaa;margin-top:4px">✓ '+(function(s){var p=s.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);})(e.datefinished)+'</div>':'')
        +(e.notes?'<div style="font-size:12px;color:#888;margin-top:5px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical">'+e.notes+'</div>':'')
      +'</div>'
    +'</div>';
  });
  document.getElementById('cards').innerHTML=ch;

  f.forEach(function(e){
    if(imgCache[e.id]===undefined){
      (function(en){loadImg(en,function(src){if(src){applyThumb(en.id,src);imgCache[en.id]={src:src,id:en.id};}updateCarousel();updateConsuming();});})(e);
    }
  });
  tops.forEach(function(e){
    if(imgCache[e.id]===undefined){
      (function(en){loadImg(en,function(src){if(src){applyThumb(en.id,src);imgCache[en.id]={src:src,id:en.id};}});})(e);
    }
  });
  updateCarousel();
  updateConsuming();
}

function scrollToCard(id){
  var el=document.getElementById('th-'+id);
  if(!el)return;
  el.closest('.sc').scrollIntoView({behavior:'smooth',block:'center'});
  var card=el.closest('.sc');
  card.style.transition='box-shadow .3s';
  card.style.boxShadow='0 0 0 3px #C4477A';
  setTimeout(function(){card.style.boxShadow='';},1500);
}

function updateCarousel(){
  var imgs=Object.values(imgCache).filter(function(s){return s&&(typeof s==='object'?s.src:s);});
  if(!imgs.length){document.getElementById('carousel-wrap').style.display='none';return;}
  // Duplicate for seamless loop
  var all=imgs.concat(imgs);
  document.getElementById('carousel-track').innerHTML=all.map(function(item){
    var src=typeof item==='object'?item.src:item;
    var id=typeof item==='object'?item.id:'';
    return '<img class="carousel-img" src="'+src+'" '+(id?'onclick="scrollToCard(\''+id+'\')" style="cursor:pointer"':'')+' onerror="this.style.display=\'none\'">';
  }).join('');
  document.getElementById('carousel-wrap').style.display='block';
  // Adjust speed based on count
  var spd=Math.max(20,imgs.length*3);
  document.getElementById('carousel-track').style.animationDuration=spd+'s';
}

function updateConsuming(){
  var items=data.filter(function(e){return e.status==='consuming';});
  var wrap=document.getElementById('consuming-wrap');
  var container=document.getElementById('consuming-items');
  if(!items.length){wrap.style.display='none';return;}
  wrap.style.display='block';
  container.innerHTML='';
  items.forEach(function(e){
    var c=CATS[e.type];
    var cached=imgCache[e.id];
    var cachedSrc=cached&&(typeof cached==='object'?cached.src:cached);
    var thumbInner=cachedSrc?('<img src="'+cachedSrc+'" style="width:100%;height:100%;object-fit:cover;border-radius:6px">'):('<span>'+c.e+'</span>');
    var div=document.createElement('div');
    div.className='consuming-item';
    div.setAttribute('data-id',e.id);
    div.innerHTML='<div class="consuming-thumb">'+thumbInner+'</div>'
      +'<div><div class="consuming-title">'+e.title+'</div>'
      +'<div class="consuming-type">'+c.sl+'</div></div>';
    if(currentUser){
      div.title='Edit';
      div.style.cursor='pointer';
      div.addEventListener('click',function(){openM(e.id);});
    }
    container.appendChild(div);
  });
}
</script>
</body>
</html>
